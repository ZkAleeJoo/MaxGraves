general:
  language: "en"
  prefix: "&#8A2BE2&lMaxGraves &8» "

grave:
  #Time in seconds before the tomb disappears (3600 = 1 hour)
  despawn-time: 3600
  create-on-death: true
  #Material used as grave marker (valid: PLAYER_HEAD, CHEST)
  marker-block: "PLAYER_HEAD"
  info-menu:
    item:
      #Material used for each grave entry in /maxgraves info menu
      material: "PAPER"
  hologram:
    enabled: true
    #How many ticks between hologram refreshes (20 ticks = 1 second)
    update-interval-ticks: 20
    #Vertical offset from the grave marker to the first hologram line
    base-height: 0.3
    #Distance between each hologram line
    line-spacing: 0.25
    #Available placeholders: {player}, {player_level}, {killer}, {time_left}, {x}, {y}, {z}
    lines:
      - "&7{player} &c☠"
      - "&8• &fLvl: &7{player_level}"
      - "&8• &cKilled by &f{killer}"
      - "&e{time_left}"
  claim-animation:
    enabled: true
    #Delay before rewards are given after claiming (20 ticks = 1 second)
    delay-ticks: 20
    lightning:
      #Uses a visual lightning strike effect without damage
      enabled: true
    sound:
      #Sound played when claiming the grave
      type: "ITEM_TOTEM_USE"
      volume: 1.0
      pitch: 0.75
  effects:
    enabled: true
    #Particle update speed (5 ticks = 0.25 seconds)
    update-interval-ticks: 5
    #Primary particle drawn in the spiral around the grave (examples: SOUL, WITCH, SPELL_WITCH)
    primary-particle: "SOUL"
    #Secondary particle used as ambient smoke around the grave (examples: SMOKE, SMOKE_LARGE)
    secondary-particle: "SMOKE"
    primary-count: 4
    secondary-count: 2
    #Controls spiral shape and movement
    spiral-radius: 0.7
    spiral-height: 1.3
    vertical-speed: 0.05
    ambient-sound:
      enabled: true
      #Any Bukkit Sound enum value can be used
      type: "BLOCK_SOUL_SAND_HIT"
      volume: 0.45
      pitch: 0.7
