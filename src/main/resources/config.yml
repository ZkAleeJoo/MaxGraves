general:
  language: "en"
  prefix: "&#8A2BE2&lMaxGraves &8» "

grave:
  #Time in seconds before the tomb disappears (3600 = 1 hour)
  despawn-time: 3600
  create-on-death: true
  #Material used as grave marker (valid: PLAYER_HEAD, CHEST)
  marker-block: "PLAYER_HEAD"
  info-menu:
    item:
      #Material used for each grave entry in /maxgraves info menu
      material: "PAPER"
  hologram:
    enabled: true
    #How many ticks between hologram refreshes (20 ticks = 1 second)
    update-interval-ticks: 20
    #Vertical offset from the grave marker to the first hologram line
    base-height: 0.3
    #Distance between each hologram line
    line-spacing: 0.25
    #Available placeholders: {player}, {player_level}, {killer}, {time_left}, {x}, {y}, {z}
    lines:
      - "&7{player} &c☠"
      - "&8• &fLvl: &7{player_level}"
      - "&8• &cKilled by &f{killer}"
      - "&e{time_left}"
